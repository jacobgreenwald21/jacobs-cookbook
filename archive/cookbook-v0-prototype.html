<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jacob's Cookbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --border2: #3a3a3a;
    --text: #e8e4dc;
    --text2: #9a9590;
    --text3: #6a6560;
    --accent: #c8a96e;
    --accent2: #a07c3e;
    --green: #4a8c5c;
    --red: #8c4a4a;
    --radius: 8px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; }
  h1,h2,h3,h4 { font-family: 'Lora', serif; font-weight: 500; line-height: 1.3; }

  /* NAV */
  nav { position: sticky; top: 0; z-index: 100; background: rgba(15,15,15,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 58px; }
  .nav-brand { font-family: 'Lora', serif; font-size: 1.25rem; font-weight: 600; color: var(--accent); cursor: pointer; letter-spacing: 0.02em; }
  .nav-links { display: flex; gap: 8px; align-items: center; }
  .nav-btn { background: none; border: 1px solid var(--border2); color: var(--text2); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; transition: all 0.15s; }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.active { background: var(--accent); color: #0f0f0f; border-color: var(--accent); font-weight: 500; }

  /* LAYOUT */
  .page { display: none; }
  .page.active { display: block; }
  .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }

  /* HOME PAGE */
  .home-header { padding: 3rem 2rem 2rem; max-width: 1100px; margin: 0 auto; }
  .home-title { font-size: 2.4rem; color: var(--text); margin-bottom: 0.4rem; }
  .home-sub { color: var(--text2); font-size: 0.95rem; }

  /* FILTERS */
  .filters-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; position: sticky; top: 58px; z-index: 90; }
  .filters-inner { max-width: 1100px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .filter-input { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 7px 14px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 14px; width: 220px; outline: none; }
  .filter-input:focus { border-color: var(--accent); }
  .filter-input::placeholder { color: var(--text3); }
  .filter-select { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 7px 12px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; cursor: pointer; }
  .filter-select:focus { border-color: var(--accent); }
  .filter-select option { background: var(--surface2); }
  .fav-toggle { background: none; border: 1px solid var(--border2); color: var(--text2); padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; transition: all 0.15s; white-space: nowrap; }
  .fav-toggle.on { background: rgba(200,169,110,0.15); border-color: var(--accent); color: var(--accent); }
  .filter-clear { background: none; border: none; color: var(--text3); font-size: 12px; cursor: pointer; padding: 4px 8px; font-family: 'DM Sans', sans-serif; }
  .filter-clear:hover { color: var(--text2); }

  /* RECIPE GRID */
  .recipe-grid { max-width: 1100px; margin: 0 auto; padding: 2rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.25rem; }
  .recipe-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.4rem; cursor: pointer; transition: all 0.18s; position: relative; }
  .recipe-card:hover { border-color: var(--border2); background: var(--surface2); transform: translateY(-2px); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.7rem; }
  .card-title { font-family: 'Lora', serif; font-size: 1.05rem; color: var(--text); line-height: 1.35; flex: 1; margin-right: 10px; }
  .fav-star { background: none; border: none; font-size: 16px; cursor: pointer; color: var(--text3); line-height: 1; padding: 2px; flex-shrink: 0; transition: color 0.15s; }
  .fav-star.active { color: var(--accent); }
  .card-desc { font-size: 13px; color: var(--text2); margin-bottom: 1rem; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; letter-spacing: 0.02em; }
  .badge-time { background: rgba(74,140,92,0.18); color: #6dbf8a; border: 1px solid rgba(74,140,92,0.3); }
  .badge-diff { background: rgba(200,169,110,0.14); color: var(--accent); border: 1px solid rgba(200,169,110,0.25); }
  .badge-meal { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); }
  .badge-diff.hard { background: rgba(140,74,74,0.18); color: #d08080; border-color: rgba(140,74,74,0.3); }
  .no-results { max-width: 1100px; margin: 0 auto; padding: 4rem 2rem; text-align: center; color: var(--text3); }
  .no-results h3 { font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--text2); }

  /* RECIPE DETAIL */
  .detail-page { max-width: 780px; margin: 0 auto; padding: 2rem; }
  .back-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; padding: 0; margin-bottom: 2rem; display: flex; align-items: center; gap: 6px; transition: color 0.15s; }
  .back-btn:hover { color: var(--text2); }
  .detail-header { margin-bottom: 2rem; }
  .detail-title { font-size: 2rem; color: var(--text); margin-bottom: 0.8rem; }
  .detail-desc { color: var(--text2); font-size: 0.95rem; margin-bottom: 1.2rem; line-height: 1.6; }
  .detail-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
  .detail-fav { background: none; border: 1px solid var(--border2); color: var(--text2); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; transition: all 0.15s; }
  .detail-fav.active { border-color: var(--accent); color: var(--accent); background: rgba(200,169,110,0.1); }
  .detail-divider { border: none; border-top: 1px solid var(--border); margin: 1.8rem 0; }
  .detail-section-title { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 1rem; }
  .ingredients-list { list-style: none; display: grid; grid-template-columns: 1fr 1fr; gap: 4px 1.5rem; }
  .ingredients-list li { font-size: 14px; color: var(--text2); padding: 5px 0; border-bottom: 1px solid var(--border); line-height: 1.4; }
  .steps-list { list-style: none; counter-reset: steps; }
  .steps-list li { counter-increment: steps; display: flex; gap: 1rem; margin-bottom: 1.2rem; font-size: 14px; color: var(--text2); line-height: 1.6; }
  .steps-list li::before { content: counter(steps); background: var(--surface2); color: var(--accent); border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; margin-top: 1px; border: 1px solid var(--border2); }
  .tags-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 1.5rem; }
  .tag { background: var(--surface2); border: 1px solid var(--border); color: var(--text3); padding: 3px 10px; border-radius: 20px; font-size: 12px; }

  /* AI GENERATE PAGE */
  .ai-page { max-width: 780px; margin: 0 auto; padding: 2rem; }
  .ai-header { margin-bottom: 2rem; }
  .ai-title { font-size: 1.8rem; margin-bottom: 0.4rem; }
  .ai-sub { color: var(--text2); font-size: 0.9rem; }
  .api-key-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.2rem 1.5rem; margin-bottom: 1.5rem; }
  .api-key-label { font-size: 12px; color: var(--text3); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; font-weight: 500; }
  .api-key-row { display: flex; gap: 8px; }
  .api-key-input { flex: 1; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 8px 12px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; }
  .api-key-input:focus { border-color: var(--accent); }
  .api-key-input::placeholder { color: var(--text3); }
  .api-save-btn { background: var(--accent); color: #0f0f0f; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; white-space: nowrap; }
  .api-save-btn:hover { background: var(--accent2); color: #fff; }
  .api-status { font-size: 12px; margin-top: 6px; }
  .api-status.set { color: #6dbf8a; }
  .api-status.unset { color: var(--text3); }

  .generate-form { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; }
  .form-label { font-size: 12px; color: var(--text3); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; font-weight: 500; display: block; }
  .form-textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 10px 14px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; resize: vertical; min-height: 90px; line-height: 1.5; }
  .form-textarea:focus { border-color: var(--accent); }
  .form-textarea::placeholder { color: var(--text3); }
  .form-row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  .form-select { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 8px 12px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; flex: 1; min-width: 120px; }
  .generate-btn { background: var(--accent); color: #0f0f0f; border: none; padding: 10px 22px; border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; margin-top: 14px; transition: all 0.15s; }
  .generate-btn:hover:not(:disabled) { background: var(--accent2); color: #fff; }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .draft-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; }
  .draft-title { font-size: 1.1rem; margin-bottom: 1.2rem; color: var(--text2); font-family: 'DM Sans', sans-serif; font-weight: 400; }
  .draft-title span { color: var(--accent); }
  .draft-field { margin-bottom: 1rem; }
  .draft-field-label { font-size: 11px; color: var(--text3); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 5px; font-weight: 500; }
  .draft-input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 8px 12px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; }
  .draft-input:focus { border-color: var(--accent); }
  .draft-textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 8px 12px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; resize: vertical; min-height: 80px; line-height: 1.5; }
  .draft-textarea:focus { border-color: var(--accent); }
  .draft-row { display: flex; gap: 10px; }
  .draft-row .draft-field { flex: 1; }
  .draft-actions { display: flex; gap: 10px; margin-top: 1.5rem; padding-top: 1.2rem; border-top: 1px solid var(--border); }
  .publish-btn { background: var(--green); color: #fff; border: none; padding: 10px 22px; border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; transition: opacity 0.15s; }
  .publish-btn:hover { opacity: 0.85; }
  .discard-btn { background: none; border: 1px solid var(--border2); color: var(--text3); padding: 10px 18px; border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; transition: all 0.15s; }
  .discard-btn:hover { border-color: var(--red); color: #d08080; }

  .loading-spinner { display: flex; flex-direction: column; align-items: center; gap: 1rem; padding: 2.5rem; color: var(--text2); font-size: 14px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box { background: rgba(140,74,74,0.15); border: 1px solid rgba(140,74,74,0.35); border-radius: var(--radius); padding: 1rem 1.2rem; color: #d08080; font-size: 13px; margin-bottom: 1rem; }
  .success-box { background: rgba(74,140,92,0.15); border: 1px solid rgba(74,140,92,0.3); border-radius: var(--radius); padding: 0.8rem 1.2rem; color: #6dbf8a; font-size: 13px; margin-bottom: 1rem; }

  /* TOAST */
  .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 12px 18px; border-radius: var(--radius); font-size: 13px; z-index: 999; animation: slideup 0.2s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  @keyframes slideup { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    nav { padding: 0 1rem; }
    .home-header, .container { padding-left: 1rem; padding-right: 1rem; }
    .recipe-grid { padding: 1rem; grid-template-columns: 1fr; }
    .ingredients-list { grid-template-columns: 1fr; }
    .detail-page, .ai-page { padding: 1rem; }
    .filters-bar { padding: 0.75rem 1rem; }
    .home-title { font-size: 1.7rem; }
    .draft-row { flex-direction: column; }
  }
</style>
</head>

<nav>

  <div class="nav-links">

</nav>

<!-- HOME PAGE -->

      <select class="filter-select" id="f-diff" onchange="applyFilters()">
        <option value="">Any difficulty</option>
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
      </select>
      <select class="filter-select" id="f-time" onchange="applyFilters()">

      <div class="api-status" id="api-status"></div>

      <div class="form-row">
        <select class="form-select" id="gen-meal">

          <option value="dinner">Dinner</option>

          <option value="dessert">Dessert</option>

          <option value="">Any difficulty</option>
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
        <select class="form-select" id="gen-time">
          <option value="">Any time</option>
          <option value="20">Under 20 min</option>
          <option value="30">Under 30 min</option>

</div>

const FAVS_KEY = 'cookbook_favs';

// ── SEED DATA ──────────────────────────────────────────────────────────────
const SEED = [{"id":"69c6b967b85bcac1cc9d5c6f","title":"Baked Chicken Parmesan with Spaghetti","slug":"baked-chicken-parmesan-with-spaghetti","description":"A quick and easy recipe for baked chicken parmesan served with spaghetti, perfect for a single serving meal.","meal_type":"dinner","difficulty":"easy","servings":"1 serving","total_time_minutes":40,"prep_time_minutes":25,"cook_time_minutes":31,"tags":["chicken","parmesan","spaghetti","baked","italian"],"ingredients":["1 chicken breast, halved","Salt","Black pepper","1 whole egg","1/2 cup panko breadcrumbs","2 Tbsp grated parmesan","1/2 tsp garlic powder","1/2 tsp Italian seasoning","1/2 cup marinara sauce","1/3 cup shredded mozzarella","Olive oil (for drizzling or spraying)","2 oz thin spaghetti","Salt (for water)"],"steps":["Preheat oven to 425°F. Line a baking sheet with parchment paper or lightly grease.","Pat chicken dry and season with salt and pepper.","In one bowl, beat the egg. In another, combine panko, parmesan, garlic powder, and Italian seasoning.","Dip chicken into egg, then coat thoroughly in breadcrumb mixture. Place on baking sheet. Lightly drizzle or spray with olive oil.","Bake for 15 minutes.","Remove from oven, spoon marinara over each piece, and top with mozzarella.","Return to oven and bake another 5-7 minutes until cheese is melted and chicken reaches 165°F.","While chicken bakes, bring a pot of salted water to a boil. Cook spaghetti according to package instructions (about 7-9 minutes). Drain.","Plate spaghetti, top with chicken parmesan, and spoon extra sauce over if desired."],"status":"published","published_at":"2026-03-27T17:07:50.952Z","created_date":"2026-03-27T17:07:51.059000"},{"id":"69c58dce91371f12e5fea7e4","title":"Honey Glazed Carrots with Lemon Garlic Chicken","slug":"honey-glazed-carrots-with-lemon-garlic-chicken","description":"This recipe features tender honey-glazed carrots roasted to perfection alongside pan-seared lemon-garlic chicken breasts. A simple pan sauce is made from the chicken drippings to tie the dish together.","meal_type":"dinner","difficulty":"medium","servings":"2 servings","total_time_minutes":35,"prep_time_minutes":20,"cook_time_minutes":30,"tags":["chicken","carrots","honey glazed","lemon garlic","pan-seared","roasted"],"ingredients":["1 lb baby carrots","1 Tbsp olive oil","1 1/2 Tbsp honey","1 Tbsp butter","Salt","Black pepper","2 chicken breasts (halved horizontally)","Salt","Black pepper","1/2 tsp garlic powder","1/2 tsp paprika","Pinch chili flakes","1 Tbsp olive oil","2-3 Tbsp chicken broth","1-2 Tbsp lemon juice","1 Tbsp butter"],"steps":["Preheat oven to 425°F. Toss carrots with olive oil, honey, butter, salt, and pepper.","Spread the seasoned carrots on a sheet pan in a single layer.","Roast carrots for 25-30 minutes, stirring once halfway through, until tender and caramelized.","Pat chicken dry and season both sides with salt, pepper, garlic powder, paprika, and chili flakes.","When carrots have about 15 minutes left in their roasting time, heat a skillet over medium to medium-high heat and add olive oil.","Cook chicken 4-5 minutes on the first side without moving, then flip and cook for another 3-5 minutes until the internal temperature reaches 160-165°F.","Remove the chicken from the pan and let it rest.","In the same pan, add chicken broth and lemon juice, scrape up any browned bits from the bottom, and simmer for 1 minute.","Add butter to the pan sauce and swirl until it becomes glossy.","Slice chicken if desired, then plate it with the roasted carrots and spoon the pan sauce over the chicken."],"status":"published","published_at":"2026-03-26T19:49:34.625Z","created_date":"2026-03-26T19:49:34.758000"},{"id":"69bb16fcc025ceac2541623e","title":"Lemon and Garlic Chicken with Cherry Tomatoes","slug":"lemon-and-garlic-chicken-with-cherry-tomatoes","description":"This recipe features tender chicken breasts marinated in a zesty lemon-garlic mixture, then seared and finished with sweet cherry tomatoes. It's a quick and flavorful dish perfect for a weeknight meal.","meal_type":"dinner","difficulty":"easy","servings":"4 servings","total_time_minutes":75,"prep_time_minutes":10,"cook_time_minutes":11,"tags":["chicken","lemon","garlic","cherry tomatoes","skillet","marinade"],"ingredients":["2 Tbsp olive oil","3 Tbsp lemon juice","2 garlic cloves, minced","1 tsp rosemary","Salt","Black pepper","2 boneless skinless chicken breasts","2 Tbsp flour","Salt","Black pepper","2 Tbsp canola oil","1/4 cup chicken stock","3/4 lb cherry tomatoes","Pinch white sugar","Salt","1 Tbsp parsley","Parmesan"],"steps":["Stir olive oil, lemon juice, garlic, rosemary, salt, and pepper in a bowl.","Cut each chicken breast into 2 equal pieces. Add to marinade, cover, and refrigerate for 30 minutes.","Remove chicken, pat dry, and pound to about 1/4 inch thickness.","Season lightly with salt and pepper, then dredge in flour, shaking off excess.","Preheat oven to low (to keep chicken warm).","Heat skillet over high heat. Add canola oil.","Cook chicken about 90 seconds per side until browned. Transfer to sheet pan and keep warm in oven.","Reduce heat to medium-high. Deglaze pan with chicken stock, scraping browned bits.","Add cherry tomatoes and cook about 8 minutes, stirring frequently, until softened.","Add a pinch of sugar and salt to taste.","Remove chicken from oven. Top with tomato mixture.","Garnish with parsley and parmesan and serve."],"status":"published","published_at":"2026-03-18T21:19:55.732Z","created_date":"2026-03-18T21:19:56.056000"},{"id":"69bb15dca55b7e636c89355a","title":"Baked Hot Honey Chicken","slug":"baked-hot-honey-chicken","description":"This recipe features tender boneless, skinless chicken baked to golden perfection and then drizzled with a sweet and spicy hot honey sauce.","meal_type":"dinner","difficulty":"easy","servings":"2–4 servings","total_time_minutes":35,"prep_time_minutes":15,"cook_time_minutes":22,"tags":["chicken","hot honey","baked","spicy","easy"],"ingredients":["1 lb boneless, skinless chicken (breast or thighs)","Salt","Black pepper","Garlic powder","Paprika","1-2 eggs","1 cup breadcrumbs or panko","1/4-1/3 cup honey","1-2 Tbsp hot sauce","1 Tbsp butter (optional)","Pinch chili flakes or cayenne (optional)"],"steps":["Preheat oven to 400–425°F. Line a baking sheet with parchment paper or lightly grease.","Season chicken with salt, pepper, garlic powder, and paprika.","Prepare two bowls: one with beaten eggs and one with breadcrumbs.","Dip chicken into egg, then coat fully in breadcrumbs. Place on baking sheet.","Bake for 18-22 minutes, until chicken reaches 165°F and coating is golden.","While chicken bakes, combine honey, hot sauce, butter, and chili flakes in a small pan. Warm over low heat until smooth.","Remove chicken from oven and drizzle with hot honey sauce. Serve immediately."],"status":"published","published_at":"2026-03-18T21:15:08.677Z","created_date":"2026-03-18T21:15:08.827000"},{"id":"69bb1545fb3cac9d0999d3c2","title":"Honey Lemon Soy Chicken","slug":"honey-lemon-soy-chicken","description":"This recipe features tender boneless, skinless chicken thighs marinated in a honey lemon soy sauce, air-fried to perfection, and served alongside roasted broccoli.","meal_type":"dinner","difficulty":"easy","servings":"2-3 servings","total_time_minutes":45,"prep_time_minutes":25,"cook_time_minutes":20,"tags":["chicken","honey","lemon","soy","broccoli","air fryer","roasted"],"ingredients":["1/4 cup honey","2 Tbsp lemon juice","2 Tbsp Dale's Reduced Sodium Marinade (Gluten Free)","Salt and pepper to taste","Boneless, skinless chicken thighs","Medium broccoli florets","Olive oil","Salt","Black pepper","Garlic powder","Chili flakes","Splash of lemon juice"],"steps":["Whisk honey, lemon juice, Dale's marinade, salt, and pepper until smooth. Marinate chicken for at least 30 minutes. Reserve a portion before adding raw chicken if using as a glaze. Simmer reserved marinade 3-5 minutes until slightly thickened.","Preheat air fryer to 400°F. Place marinated chicken thighs in air fryer and cook 16 minutes, flipping halfway if desired, until internal temperature reaches 175°F. Brush with glaze during last few minutes or immediately after cooking.","Preheat oven to 425°F. Toss broccoli with olive oil, salt, pepper, garlic powder, and chili flakes. Spread onto baking sheet and press down firmly using a mixing bowl to maximize contact with the pan. Roast for 20 minutes until browned. Finish with a splash of lemon juice before serving."],"status":"published","published_at":"2026-03-18T21:12:36.930Z","created_date":"2026-03-18T21:12:37.084000"},{"id":"69a61051f1aad28b89542f82","title":"Salmon and Sweet Potato","slug":"salmon-and-sweet-potato","description":"This recipe features salmon fillets and sweet potatoes, seasoned and baked, with a mustard and brown sugar glaze for the salmon.","meal_type":"dinner","difficulty":"easy","servings":"2","total_time_minutes":45,"prep_time_minutes":15,"cook_time_minutes":30,"tags":["dinner","salmon","sweet potato"],"ingredients":["2 salmon fillets","2 medium sweet potatoes","2 tbsp olive oil","salt","black pepper","1 tsp dried rosemary","1/2 tsp onion powder","1/2 tsp garlic powder","1 tbsp dijon mustard","1.5 tbsp brown sugar"],"steps":["Preheat oven to 400 degrees Fahrenheit.","Dice sweet potatoes into 1-inch cubes.","Toss sweet potatoes with 1 tbsp olive oil, salt, pepper, garlic power, and onion powder.","Bake for 15 minutes until they begin to soften.","Combine mustard and brown sugar.","Drizzle salmon with olive oil and season with salt and pepper.","Brush brown sugar mix onto salmon.","Remove potatoes and move to side of sheet.","Place salmon fillets on.","Cook for another 10-15 minutes (flakes easily with fork)."],"status":"published","published_at":"2026-03-02T22:33:53.230Z","created_date":"2026-03-02T22:33:53.373000"},{"id":"69a6102d516898c59dd7dd55","title":"Chicken with Mushroom Pan Sauce","slug":"chicken-with-mushroom-pan-sauce","description":"A flavorful chicken dish featuring skin-on chicken thighs seared to perfection and finished with a rich mushroom pan sauce.","meal_type":"dinner","difficulty":"medium","servings":"6 servings","total_time_minutes":45,"prep_time_minutes":15,"cook_time_minutes":30,"tags":["chicken","mushroom","pan sauce","dinner"],"ingredients":["6 skin on chicken thighs","2 packs mushrooms","2 garlic cloves, minced","1 shallot, minced","1 1/2 cups chicken stock","1/2 cup heavy cream","1 1/2 tbsp olive oil","salt","black pepper","butter","thyme","lemon juice"],"steps":["Preheat oven to 375 degrees Fahrenheit.","Remove chicken from fridge, pat dry, season lightly with salt and pepper, and rest for 15 minutes.","Heat large skillet over medium-high heat.","Add oil and sear chicken until skin browned (5-6 minutes).","Flip and sear other side, then remove thighs and set aside.","Melt butter in skillet and saute mushrooms for 5-6 minutes, adding in garlic and shallots towards the end.","Add thyme, salt, and pepper and continue to saute for 1 minute.","Deglaze with chicken stock, scraping up all bits.","Reduce heat to simmer until stock has halved, add salt and pepper.","Nestle chicken thighs skin side up in pan, cover with mushroom sauce, and cook in oven for 15 minutes.","Remove from heat and remove chicken from skillet.","Add heavy cream and lemon juice to taste, and adjust stock/seasonings as needed.","Pour sauce back over chicken and serve."],"status":"published","published_at":"2026-03-02T22:33:17.230Z","created_date":"2026-03-02T22:33:17.325000"},{"id":"69a610173a72bba892c310f7","title":"Banana Protein Pancakes","slug":"banana-protein-pancakes","description":"A simple recipe for protein-packed banana pancakes, perfect for a healthy breakfast option.","meal_type":"breakfast","difficulty":"easy","servings":"Makes 10 pancakes","total_time_minutes":20,"prep_time_minutes":20,"cook_time_minutes":20,"tags":["banana","protein","pancakes","breakfast"],"ingredients":["3 large bananas","3 large eggs","1 scoop peanut butter","1/2 scoop vanilla protein powder","1/2 cup oats","honey","cinnamon"],"steps":["Pre-heat large pan on medium heat and spray with nonstick cooking spray.","Mash bananas with a fork.","Combine all ingredients in blender. Then, blend to desired consistency.","Pour batter into pan for small-medium pancakes.","Flip when bubbling and golden brown."],"status":"published","published_at":"2026-03-02T22:32:55.019Z","created_date":"2026-03-02T22:32:55.138000"},{"id":"69a60fff36c77fc9419bad52","title":"Banana Bread Muffins (with Chocolate Chips)","slug":"banana-bread-muffins-with-chocolate-chips","description":"A delicious recipe for banana bread muffins featuring chocolate chips, perfect for breakfast or a snack. These muffins are relatively easy to make and yield 24 servings.","meal_type":"snack","difficulty":"easy","servings":"Makes 24 muffins","total_time_minutes":45,"prep_time_minutes":15,"cook_time_minutes":20,"tags":["banana","muffin","chocolate chips","baking"],"ingredients":["3 large ripe bananas","2 cups all-purpose flour","3/4 cup brown sugar","1 teaspoon baking soda","1/2 teaspoon salt","1/2 teaspoon vanilla extract","1 stick butter, melted","2 large eggs","semi-sweet chocolate chips (minimum 1/3 cup)"],"steps":["Heat oven to 350 degrees F. Spray muffin tin with nonstick cooking spray.","Mash bananas until almost smooth in a medium mixing bowl with a fork. Set aside.","Whisk together flour, brown sugar, baking soda, and salt in a large mixing bowl. (If there are any lumps of brown sugar, rub them with your fingers to break them up.)","Melt butter.","Combine melted butter, eggs, vanilla extract, and mashed bananas with dry ingredient. Stir until a batter forms.","Add chocolate chips.","Spread batter evenly into greased muffin tray.","Bake until a toothpick inserted into the middle of the loaf comes out clean, about 20 minutes.","Cool muffins in tray for 10 minutes. Remove from tray and allow to cool completely on a wire rack."],"status":"published","published_at":"2026-03-02T22:32:31.512Z","created_date":"2026-03-02T22:32:31.602000"},{"id":"69a60fd7254e363bd957d440","title":"My Best Pumpkin Bread","slug":"my-best-pumpkin-bread","description":"Homemade pumpkin bread is a favorite fall recipe packed with sweet cinnamon spice, tons of pumpkin flavor, and optional chocolate chips.","meal_type":"dessert","difficulty":"easy","servings":"1 loaf","total_time_minutes":75,"prep_time_minutes":15,"cook_time_minutes":60,"tags":["pumpkin","bread","chocolate chips","fall","baked goods"],"ingredients":["1 and 3/4 cups (219g) all-purpose flour (spooned & leveled)","1 teaspoon baking soda","2 teaspoons ground cinnamon","1/4 teaspoon ground nutmeg*","1/4 teaspoon ground cloves*","1/4 teaspoon ground ginger*","3/4 teaspoon salt","2 large eggs, at room temperature","1/2 cup (100g) granulated sugar","3/4 cup (150g) packed light or dark brown sugar","1 and 1/2 cups (340g) pumpkin puree (canned or fresh)","1/2 cup (120ml) vegetable oil, canola oil, or melted coconut oil","1/4 cup (60ml) orange juice*","2/3 cup (120g) semi-sweet chocolate chips*"],"steps":["Adjust the oven rack to the lower third position and preheat the oven to 350°F (177°C). Grease a metal 9x5-inch loaf pan with non-stick spray.","In a large bowl, whisk the flour, baking soda, cinnamon, nutmeg, cloves, ginger, and salt together. In a medium bowl, whisk the eggs, granulated sugar, and brown sugar. Whisk in the pumpkin, oil, and orange juice. Pour wet into dry and gently mix. Fold in chocolate chips.","Pour the batter into the prepared loaf pan. Bake for 60-65 minutes, covering loosely with foil halfway through. Done when a toothpick comes out clean.","Allow the bread to cool completely in the pan before removing and slicing.","Cover and store at room temperature for up to 3–4 days, or refrigerate for up to a week."],"status":"published","published_at":"2026-03-02T22:31:51.763Z","created_date":"2026-03-02T22:31:51.870000"},{"id":"69a60fa4858dcec8d0a69886","title":"Roasted Brussels Sprouts with Balsamic Vinegar & Honey","slug":"roasted-brussels-sprouts-with-balsamic-vinegar-honey","description":"It's hard to improve on simple roasted Brussels sprouts, but a splash of balsamic vinegar and a drizzle of honey bring the flavors to life.","meal_type":"other","difficulty":"easy","servings":"6 servings","total_time_minutes":30,"prep_time_minutes":10,"cook_time_minutes":20,"tags":["brussels sprouts","roasted","balsamic vinegar","honey","vegetable","side dish"],"ingredients":["1½ pounds Brussels sprouts, halved, stems and ragged outer leaves removed","3 tablespoons extra virgin olive oil","½ teaspoon kosher salt","½ teaspoon freshly ground black pepper","1 tablespoon balsamic vinegar","1 teaspoon honey"],"steps":["Preheat oven to 425°F and set an oven rack in the middle position. Line a baking sheet with heavy-duty aluminum foil.","Directly on the prepared baking sheet, toss the Brussels sprouts with 2 tablespoons of the oil, the salt, and the pepper. Roast, stirring once halfway through, until tender and golden brown, about 20 minutes.","Drizzle the remaining tablespoon of oil, the balsamic vinegar and the honey over the roasted Brussels sprouts. Toss to coat evenly. Taste and adjust seasoning, if necessary, then serve.","If you have some brussels sprouts that are very large, cut them into quarters. They should all be cut about the same size to ensure even cooking."],"status":"published","published_at":"2026-03-02T22:31:00.215Z","created_date":"2026-03-02T22:31:00.354000"},{"id":"69a60f71294bacaf431dffc3","title":"Savory Lemon Orzo with Caramelized Onion","slug":"savory-lemon-orzo-with-caramelized-onion","description":"This savory orzo dish features sweet caramelized onions and a bright lemon flavor, designed to be cooked alongside salmon for a delicious and complete meal.","meal_type":"other","difficulty":"easy","servings":"Serves 2-4","total_time_minutes":21,"prep_time_minutes":5,"cook_time_minutes":16,"tags":["lemon","orzo","caramelized onion","side dish","quick"],"ingredients":["1 cup orzo","1/2-1 white onion, thinly sliced","1-2 Tbsp olive oil","Salt","Black pepper","1-2 Tbsp lemon juice","Optional: tiny splash soy sauce (1/2 tsp max)"],"steps":["Start the onions: Heat olive oil in a skillet over medium heat. Add sliced onion and a pinch of salt. Cook 10-12 minutes, stirring occasionally, until soft and lightly golden.","Cook the orzo: Bring a pot of well-salted water to a boil. Add orzo and cook 8-10 minutes until al dente. Drain (do not rinse).","Bake salmon: Place salmon in a 400°F oven and bake 12-14 minutes. Remove at 120-125°F internal temperature.","Combine: Add drained orzo to the skillet with onions. Stir in lemon juice, black pepper, and optional small splash soy sauce. Toss over low heat for 1-2 minutes. Adjust salt to taste.","Serve immediately with salmon."],"status":"published","published_at":"2026-03-02T22:30:09.565Z","created_date":"2026-03-02T22:30:09.766000"},{"id":"69a60e88b4a49f5a3cdf893c","title":"Creamy Mushroom Tomato Orzo with Crispy Skin Salmon","slug":"creamy-mushroom-tomato-orzo-with-crispy-skin-salmon","description":"This recipe features pan-seared salmon with crispy skin served over a creamy orzo base, rich with mushrooms, tomatoes, and spinach.","meal_type":"dinner","difficulty":"medium","servings":"Serves 2-4","total_time_minutes":45,"prep_time_minutes":15,"cook_time_minutes":30,"tags":["salmon","orzo","mushrooms","tomato","creamy","one-pan","seared"],"ingredients":["salmon","salt","black pepper","1/2 white onion","1 cup mushrooms","1-2 garlic cloves","1/2 cup grape tomatoes","spinach","3/4 cup dry orzo","1 1/2 cups chicken broth","1 Tbsp butter","1-2 Tbsp heavy cream","1/4-1/3 cup grated parmesan","1 Tbsp olive oil"],"steps":["Pat salmon dry. Season both sides with salt and black pepper. Let sit at room temperature.","Dice 1/2 white onion. Slice 1 cup mushrooms. Mince 1-2 garlic cloves.","Measure 1/2 cup grape tomatoes (leave whole). Roughly chop spinach if needed.","Measure: 3/4 cup dry orzo, 1 1/2 cups chicken broth, 1 Tbsp butter, 1-2 Tbsp heavy cream, and 1/4-1/3 cup grated parmesan.","Heat skillet over medium-high. Add 1 Tbsp olive oil. Place salmon skin-side down and press gently for 10 seconds. Cook 4-5 minutes. Flip and cook 1-2 minutes more. Remove at 115-120°F internal temperature. Do not wipe pan.","Reduce heat to medium. Add butter and onion. Cook 3-4 minutes until soft. Add mushrooms and a pinch of salt. Cook 5-6 minutes until lightly browned. Add garlic for last 30 seconds.","Add dry orzo, chicken broth, and tomatoes. Bring to gentle boil. Reduce to low, cover, and simmer 10-12 minutes, stirring occasionally, until tender and liquid mostly absorbed.","Stir in heavy cream, parmesan, and spinach. Cook 1-2 minutes until spinach wilts. Adjust salt and pepper.","Spoon orzo into bowls. Place salmon skin-side up on top. Let rest 1 minute before serving."],"status":"published","published_at":"2026-03-02T22:26:15.996Z","created_date":"2026-03-02T22:26:16.104000"},{"id":"69a5142563451c3e38bce46c","title":"Turkey Meatball Bowl (1 lb Version)","slug":"turkey-meatball-bowl-1-lb-version","description":"This recipe guides you through making a satisfying turkey meatball bowl, complete with roasted sweet potatoes, green beans, and a tangy lemon-Dijon yogurt sauce, utilizing both an oven and an air fryer for efficiency.","meal_type":"dinner","difficulty":"easy","servings":"Not specified","total_time_minutes":30,"prep_time_minutes":15,"cook_time_minutes":30,"tags":["turkey","meatballs","bowl","sweet potato","green beans","air fryer","roasted","lemon-dijon","yogurt sauce"],"ingredients":["1 lb ground turkey","1/2 cup panko breadcrumbs","1 egg","1/4 cup grated parmesan","1/2-3/4 tsp salt","1/2 tsp black pepper","1/2 tsp garlic powder","1 tsp Italian seasoning","1 tsp lemon juice (for meatballs)","1-2 sweet potatoes, cubed","1-2 Tbsp olive oil (for sweet potatoes)","Salt + pepper (for sweet potatoes)","1 lb green beans, trimmed","Olive oil (for green beans)","Salt + pepper (for green beans)","1/4 cup Greek yogurt","1 tsp Dijon mustard","1 Tbsp lemon juice (for sauce)","1/2 Tbsp olive oil (for sauce)","Salt + pepper (for sauce)"],"steps":["For the meatballs, gently mix together the ground turkey, panko breadcrumbs, egg, grated parmesan, salt, black pepper, garlic powder, Italian seasoning, and 1 tsp lemon juice.","Form the mixture into 1 1/2-inch balls (you should get about 14-16 meatballs).","Prepare the sweet potatoes by cubing 1-2 sweet potatoes and tossing them with 1-2 Tbsp olive oil, salt, and pepper.","Prepare the green beans by trimming 1 lb green beans and tossing them with olive oil, salt, and pepper.","At the start (Minute 0), place the seasoned sweet potatoes in an oven preheated to 425°F to roast for 28-30 minutes total.","At Minute 10, add the seasoned green beans to the oven alongside the sweet potatoes and roast for 18-20 minutes.","At Minute 12, start cooking the meatballs in an air fryer at 400°F for 10-12 minutes, flipping them halfway through. Ensure their internal temperature reaches 160-165°F.","While everything is cooking, prepare the Lemon-Dijon Yogurt Sauce: whisk together 1/4 cup Greek yogurt, 1 tsp Dijon mustard, 1 Tbsp lemon juice, 1/2 Tbsp olive oil, salt, and pepper until smooth.","If needed for drizzling consistency, add a splash of water to the sauce.","All components should be cooked and ready to serve between Minute 28 and 30."],"status":"published","published_at":"2026-03-02T04:37:57.598Z","created_date":"2026-03-02T04:37:57.699000"},{"id":"69a5051131aa0c351aca1e05","title":"Lemon-Dijon Chicken Sausage, Broccoli & Tomato Skillet","slug":"lemon-dijon-chicken-sausage-broccoli-tomato-skillet","description":"A flavorful and easy one-pan meal featuring lemon-Dijon chicken sausage, tender-crisp broccoli, and sweet cherry tomatoes, all simmered in a savory broth.","meal_type":"dinner","difficulty":"easy","servings":"Serves 4","total_time_minutes":35,"prep_time_minutes":15,"cook_time_minutes":20,"tags":["chicken sausage","broccoli","tomato","skillet","lemon","dijon","one-pan","weeknight"],"ingredients":["3-4 chicken sausage links","1 large head broccoli","1 cup cherry tomatoes","3/4 cup chicken broth","1 1/2 tsp Dijon mustard","1-2 Tbsp bottled lemon juice","1/2 tsp garlic powder","1/4-1/2 tsp red chili flakes","1 Tbsp olive oil","pinch of salt"],"steps":["Slice 3-4 chicken sausage links into coins.","Cut 1 large head broccoli into medium florets.","Halve 1 cup cherry tomatoes.","In a small bowl, whisk together 3/4 cup chicken broth, 1 1/2 tsp Dijon mustard, 1-2 Tbsp bottled lemon juice, 1/2 tsp garlic powder, and 1/4-1/2 tsp red chili flakes.","Heat 1 Tbsp olive oil in a large skillet over medium-high.","Add sausage and cook 3–4 minutes per side until browned. Remove from pan.","In the same pan, add broccoli with a pinch of salt. Cook 5-7 minutes until tender-crisp.","Pour in the broth mixture and bring to a simmer.","Cook 3-4 minutes to reduce slightly.","Add cherry tomatoes and return sausage to the pan.","Simmer 3-5 minutes until tomatoes soften and everything is heated through."],"status":"published","published_at":"2026-03-02T03:33:37.382Z","created_date":"2026-03-02T03:33:37.560000"},{"id":"69a5042de363d290ee88ad92","title":"Savory Mushroom Orzo with Wine & Herb Chicken","slug":"savory-mushroom-orzo-with-wine-herb-chicken","description":"A delicious recipe for savory mushroom orzo served with chicken marinated in wine and herbs. The chicken is marinated for at least 4 hours, then seared and added to a flavorful mushroom and orzo dish.","meal_type":"dinner","difficulty":"medium","servings":"Serves 3-4","total_time_minutes":64,"prep_time_minutes":20,"cook_time_minutes":44,"tags":["chicken","orzo","mushroom","wine","herb","savory"],"ingredients":["3-4 boneless skinless chicken thighs","1 1/2 Tbsp olive oil (for marinade)","1 Tbsp garlic soy sauce","1 tsp Worcestershire sauce","1/2 tsp Italian seasoning","1/2 tsp black pepper","Small squeeze lemon juice","1/2 white onion","1-1 1/2 cups mushrooms","1-2 cloves garlic (for orzo)","2 Tbsp fresh parsley","3/4 cup dry orzo","1 1/2 cups chicken broth","1/3 cup dry white wine","1/4 cup parmesan","1-2 handfuls spinach","Small drizzle olive oil (for cooking)","Pinch salt"],"steps":["Marinate chicken at least 4 hours (overnight is excellent).","Remove chicken from fridge 30-40 minutes before cooking.","Dice 1/2 white onion.","Slice 1-1 1/2 cups mushrooms.","Mince 1-2 cloves garlic (for orzo).","Chop 2 Tbsp fresh parsley.","Measure 3/4 cup dry orzo.","Measure 1 1/2 cups chicken broth.","Measure 1/3 cup dry white wine.","Grate 1/4 cup parmesan.","Have 1-2 handfuls spinach ready.","Heat skillet over medium for 2-3 minutes; test with water droplets — they should bead and glide. Add small drizzle olive oil.","Cook chicken at medium heat 6-7 minutes per side until deeply golden and 165°F internal. Remove and rest. Do not wipe pan.","Lower heat slightly. Add onion and cook 4-5 minutes.","Add mushrooms with pinch salt. Cook 7-8 minutes until browned.","Add minced garlic for final 30 seconds.","Add 1/3 cup white wine. Scrape pan and reduce 3-4 minutes until nearly evaporated.","Add dry orzo and stir 1-2 minutes.","Add chicken broth. Bring to gentle simmer, cover, and cook 9-10 minutes until tender and liquid mostly absorbed.","Stir in parmesan, spinach (wilt 1-2 minutes), parsley, and black pepper. Add splash broth if needed.","Slice chicken and serve on top."],"status":"published","published_at":"2026-03-02T03:29:48.966Z","created_date":"2026-03-02T03:29:49.085000"}];

// ── STATE ──────────────────────────────────────────────────────────────────
let recipes = [];
let favs = new Set();
let showFavsOnly = false;
let currentDetail = null;
let draftRecipe = null;

function initData() {
  const stored = localStorage.getItem(RECIPES_KEY);
  recipes = stored ? JSON.parse(stored) : [...SEED];
  if (!stored) saveRecipes();
  const favStored = localStorage.getItem(FAVS_KEY);
  favs = new Set(favStored ? JSON.parse(favStored) : []);
  const key = localStorage.getItem(API_KEY_STORE);
  if (key) {
    document.getElementById('api-key-input').value = key;
    updateApiStatus(true);
  }
}
function saveRecipes() { localStorage.setItem(RECIPES_KEY, JSON.stringify(recipes)); }
function saveFavs() { localStorage.setItem(FAVS_KEY, JSON.stringify([...favs])); }

// ── NAVIGATION ─────────────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-' + (name === 'detail' ? 'home' : name)).classList.add('active');
  window.scrollTo(0, 0);
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const meal = document.getElementById('f-meal').value;
  const diff = document.getElementById('f-diff').value;
  const timeMax = document.getElementById('f-time').value;
  const sort = document.getElementById('f-sort').value;

  let filtered = recipes.filter(r => r.status === 'published');

  if (q) filtered = filtered.filter(r =>
    r.title.toLowerCase().includes(q) ||
    (r.description || '').toLowerCase().includes(q) ||
    (r.tags || []).some(t => t.toLowerCase().includes(q)) ||
    (r.ingredients || []).some(i => i.toLowerCase().includes(q))
  );
  if (meal) filtered = filtered.filter(r => r.meal_type === meal);
  if (diff) filtered = filtered.filter(r => r.difficulty === diff);
  if (timeMax) filtered = filtered.filter(r => r.total_time_minutes && r.total_time_minutes <= parseInt(timeMax));
  if (showFavsOnly) filtered = filtered.filter(r => favs.has(r.id));

  const diffOrder = { easy: 0, medium: 1, hard: 2 };
  if (sort === 'newest') filtered.sort((a, b) => new Date(b.created_date) - new Date(a.created_date));
  else if (sort === 'fastest') filtered.sort((a, b) => (a.total_time_minutes || 999) - (b.total_time_minutes || 999));
  else if (sort === 'alpha') filtered.sort((a, b) => a.title.localeCompare(b.title));
  else if (sort === 'diff') filtered.sort((a, b) => (diffOrder[a.difficulty] || 0) - (diffOrder[b.difficulty] || 0));

  renderGrid(filtered);
  document.getElementById('recipe-count').textContent = `${filtered.length} recipe${filtered.length !== 1 ? 's' : ''}`;
}

function renderGrid(list) {
  const grid = document.getElementById('recipe-grid');
  if (!list.length) {
    grid.innerHTML = '<div class="no-results" style="grid-column:1/-1"><h3>No recipes found</h3><p style="color:var(--text3);font-size:13px;margin-top:4px;">Try adjusting your filters.</p></div>';
    return;
  }
  grid.innerHTML = list.map(r => {
    const isFav = favs.has(r.id);
    const time = r.total_time_minutes ? `${r.total_time_minutes} min` : '';
    const diffClass = r.difficulty === 'hard' ? 'badge-diff hard' : 'badge-diff';
    return `<div class="recipe-card" onclick="openDetail('${r.id}')">
      <div class="card-top">
        <div class="card-title">${r.title}</div>
        <button class="fav-star ${isFav ? 'active' : ''}" onclick="event.stopPropagation();toggleFav('${r.id}')" title="Favorite">★</button>
      </div>
      ${r.description ? `<div class="card-desc">${r.description}</div>` : ''}
      <div class="card-meta">
        ${time ? `<span class="badge badge-time">${time}</span>` : ''}
        ${r.difficulty ? `<span class="badge ${diffClass}">${r.difficulty}</span>` : ''}
        ${r.meal_type ? `<span class="badge badge-meal">${r.meal_type}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function toggleFav(id) {
  if (favs.has(id)) favs.delete(id);
  else favs.add(id);
  saveFavs();
  applyFilters();
  if (currentDetail === id) renderDetail(id);
}

function toggleFavFilter() {
  showFavsOnly = !showFavsOnly;
  document.getElementById('fav-toggle').classList.toggle('on', showFavsOnly);
  applyFilters();
}

function clearFilters() {
  document.getElementById('search').value = '';
  document.getElementById('f-meal').value = '';
  document.getElementById('f-diff').value = '';
  document.getElementById('f-time').value = '';
  document.getElementById('f-sort').value = 'newest';
  showFavsOnly = false;
  document.getElementById('fav-toggle').classList.remove('on');
  applyFilters();
}

// ── DETAIL ─────────────────────────────────────────────────────────────────
function openDetail(id) {
  currentDetail = id;
  renderDetail(id);
  showPage('detail');
}

function renderDetail(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  const isFav = favs.has(r.id);
  const metas = [];
  if (r.total_time_minutes) metas.push(`<span class="badge badge-time">${r.total_time_minutes} min total</span>`);
  if (r.prep_time_minutes) metas.push(`<span class="badge badge-meal">Prep: ${r.prep_time_minutes} min</span>`);
  if (r.servings) metas.push(`<span class="badge badge-meal">${r.servings}</span>`);
  if (r.difficulty) metas.push(`<span class="badge ${r.difficulty === 'hard' ? 'badge-diff hard' : 'badge-diff'}">${r.difficulty}</span>`);
  if (r.meal_type) metas.push(`<span class="badge badge-meal">${r.meal_type}</span>`);

  document.getElementById('detail-content').innerHTML = `
    <button class="back-btn" onclick="showPage('home')">← Back to recipes</button>
    <div class="detail-header">
      <h1 class="detail-title">${r.title}</h1>
      ${r.description ? `<p class="detail-desc">${r.description}</p>` : ''}
      <div class="detail-meta">${metas.join('')}</div>
      <button class="detail-fav ${isFav ? 'active' : ''}" onclick="toggleFav('${r.id}')">
        ${isFav ? '★ Saved to favorites' : '☆ Save to favorites'}
      </button>
    </div>
    <hr class="detail-divider">
    ${r.ingredients && r.ingredients.length ? `
      <div class="detail-section-title">Ingredients</div>
      <ul class="ingredients-list">${r.ingredients.map(i => `<li>${i}</li>`).join('')}</ul>
      <hr class="detail-divider">
    ` : ''}
    ${r.steps && r.steps.length ? `
      <div class="detail-section-title">Instructions</div>
      <ol class="steps-list">${r.steps.map(s => `<li><span>${s}</span></li>`).join('')}</ol>
    ` : ''}
    ${r.tags && r.tags.length ? `
      <hr class="detail-divider">
      <div class="tags-row">${r.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    ` : ''}
  `;
}

// ── API KEY ─────────────────────────────────────────────────────────────────
function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) { updateApiStatus(false); return; }
  localStorage.setItem(API_KEY_STORE, key);
  updateApiStatus(true);
  showToast('API key saved');
}

function updateApiStatus(isSet) {
  const el = document.getElementById('api-status');
  el.className = 'api-status ' + (isSet ? 'set' : 'unset');
  el.textContent = isSet ? '✓ API key saved — ready to generate' : 'No key saved yet';
}

function getApiKey() { return localStorage.getItem(API_KEY_STORE) || ''; }

// ── AI GENERATE ─────────────────────────────────────────────────────────────
async function generateRecipe() {
  const key = getApiKey();
  if (!key) { showError('Please save your Anthropic API key first.'); return; }

  const prompt = document.getElementById('prompt-input').value.trim();
  if (!prompt) { showError('Please describe what you want to make.'); return; }

  const meal = document.getElementById('gen-meal').value;
  const diff = document.getElementById('gen-diff').value;
  const time = document.getElementById('gen-time').value;

  const constraints = [
    meal ? `Meal type: ${meal}` : '',
    diff ? `Difficulty: ${diff}` : '',
    time ? `Total time: under ${time} minutes` : '',
  ].filter(Boolean).join('. ');

  const systemPrompt = `You are a recipe generator. Return ONLY a JSON object with no extra text, no markdown fences.
The JSON must have exactly these fields:
{
  "title": "string",
  "description": "one sentence description",
  "meal_type": "breakfast|lunch|dinner|snack|dessert|other",
  "difficulty": "easy|medium|hard",
  "servings": "string like '4 servings'",
  "total_time_minutes": number,
  "prep_time_minutes": number,
  "cook_time_minutes": number,
  "tags": ["array", "of", "strings"],
  "ingredients": ["array of ingredient strings with amounts"],
  "steps": ["array of step strings, clear and actionable"]
}
Generate practical, delicious recipes. Steps should be clear and specific.`;

  const userMsg = `Generate a recipe for: ${prompt}${constraints ? '. Constraints: ' + constraints : ''}`;

  setGenerating(true);
  clearError();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        system: systemPrompt,
        messages: [{ role: 'user', content: userMsg }]
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error ${res.status}`);
    }

    const data = await res.json();
    const text = data.content[0]?.text || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const recipe = JSON.parse(clean);
    recipe.id = 'gen_' + Date.now();
    recipe.status = 'draft';
    recipe.created_date = new Date().toISOString();
    recipe.slug = recipe.title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    draftRecipe = recipe;
    renderDraft(recipe);
  } catch (e) {
    showError('Generation failed: ' + e.message);
  } finally {
    setGenerating(false);
  }
}

function renderDraft(r) {
  const el = document.getElementById('gen-draft');
  el.innerHTML = `
    <div class="draft-section">
      <div class="draft-title">Review & edit before saving — <span>Draft</span></div>
      <div class="draft-field">
        <div class="draft-field-label">Title</div>
        <input class="draft-input" id="d-title" value="${esc(r.title)}">
      </div>
      <div class="draft-field">
        <div class="draft-field-label">Description</div>
        <input class="draft-input" id="d-desc" value="${esc(r.description || '')}">
      </div>
      <div class="draft-row">
        <div class="draft-field">
          <div class="draft-field-label">Meal type</div>
          <select class="draft-input" id="d-meal">
            ${['breakfast','lunch','dinner','snack','dessert','other'].map(m =>
              `<option value="${m}" ${r.meal_type === m ? 'selected' : ''}>${m}</option>`
            ).join('')}
          </select>
        </div>
        <div class="draft-field">
          <div class="draft-field-label">Difficulty</div>
          <select class="draft-input" id="d-diff">
            ${['easy','medium','hard'].map(d =>
              `<option value="${d}" ${r.difficulty === d ? 'selected' : ''}>${d}</option>`
            ).join('')}
          </select>
        </div>
        <div class="draft-field">
          <div class="draft-field-label">Total time (min)</div>
          <input class="draft-input" id="d-time" type="number" value="${r.total_time_minutes || ''}">
        </div>
        <div class="draft-field">
          <div class="draft-field-label">Servings</div>
          <input class="draft-input" id="d-servings" value="${esc(r.servings || '')}">
        </div>
      </div>
      <div class="draft-field">
        <div class="draft-field-label">Ingredients (one per line)</div>
        <textarea class="draft-textarea" id="d-ingredients" rows="8">${(r.ingredients || []).join('\n')}</textarea>
      </div>
      <div class="draft-field">
        <div class="draft-field-label">Steps (one per line)</div>
        <textarea class="draft-textarea" id="d-steps" rows="10">${(r.steps || []).join('\n')}</textarea>
      </div>
      <div class="draft-field">
        <div class="draft-field-label">Tags (comma separated)</div>
        <input class="draft-input" id="d-tags" value="${(r.tags || []).join(', ')}">
      </div>
      <div class="draft-actions">
        <button class="publish-btn" onclick="publishDraft()">Publish Recipe</button>
        <button class="discard-btn" onclick="discardDraft()">Discard</button>
      </div>
    </div>
  `;
}

function publishDraft() {
  if (!draftRecipe) return;
  const r = {
    ...draftRecipe,
    title: document.getElementById('d-title').value.trim(),
    description: document.getElementById('d-desc').value.trim(),
    meal_type: document.getElementById('d-meal').value,
    difficulty: document.getElementById('d-diff').value,
    total_time_minutes: parseInt(document.getElementById('d-time').value) || null,
    servings: document.getElementById('d-servings').value.trim(),
    ingredients: document.getElementById('d-ingredients').value.split('\n').map(s => s.trim()).filter(Boolean),
    steps: document.getElementById('d-steps').value.split('\n').map(s => s.trim()).filter(Boolean),
    tags: document.getElementById('d-tags').value.split(',').map(s => s.trim()).filter(Boolean),
    status: 'published',
    published_at: new Date().toISOString(),
    slug: document.getElementById('d-title').value.trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''),
  };
  recipes.unshift(r);
  saveRecipes();
  draftRecipe = null;
  document.getElementById('gen-draft').innerHTML = '';
  document.getElementById('prompt-input').value = '';
  showToast('Recipe published!');
  applyFilters();
  showPage('home');
}

function discardDraft() {
  draftRecipe = null;
  document.getElementById('gen-draft').innerHTML = '';
  showToast('Draft discarded');
}

// ── HELPERS ─────────────────────────────────────────────────────────────────
function esc(s) { return (s || '').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

function setGenerating(on) {
  const btn = document.getElementById('gen-btn');
  const draft = document.getElementById('gen-draft');
  btn.disabled = on;
  btn.textContent = on ? 'Generating...' : 'Generate Recipe';
  if (on) draft.innerHTML = '<div class="loading-spinner"><div class="spinner"></div>Claude is writing your recipe...</div>';
}

function showError(msg) {
  document.getElementById('gen-error').innerHTML = `<div class="error-box">${msg}</div>`;
}
function clearError() { document.getElementById('gen-error').innerHTML = ''; }

let toastTimer;
function showToast(msg) {
  clearTimeout(toastTimer);
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; t.className = 'toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.style.display = 'block';
  toastTimer = setTimeout(() => { t.style.display = 'none'; }, 2500);
}

// ── INIT ───────────────────────────────────────────────────────────────────
initData();
applyFilters();
</script>
</body>
</html>
