<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jacob's Cookbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --border2: #3a3a3a;
    --text: #e8e4dc;
    --text2: #9a9590;
    --text3: #6a6560;
    --accent: #c8a96e;
    --accent2: #a07c3e;
    --green: #4a8c5c;
    --red: #8c4a4a;
    --radius: 8px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; }
  h1,h2,h3,h4 { font-family: 'Lora', serif; font-weight: 500; line-height: 1.3; }

  /* NAV */
  nav { position: sticky; top: 0; z-index: 100; background: rgba(15,15,15,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 58px; }
  .nav-brand { font-family: 'Lora', serif; font-size: 1.25rem; font-weight: 600; color: var(--accent); cursor: pointer; letter-spacing: 0.02em; }
  .nav-links { display: flex; gap: 8px; align-items: center; }
  .nav-btn { background: none; border: 1px solid var(--border2); color: var(--text2); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; transition: all 0.15s; }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.active { background: var(--accent); color: #0f0f0f; border-color: var(--accent); font-weight: 500; }

  /* LAYOUT */
  .page { display: none; }
  .page.active { display: block; }
  .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }

  /* HOME PAGE */
  .home-header { padding: 3rem 2rem 2rem; max-width: 1100px; margin: 0 auto; }
  .home-title { font-size: 2.4rem; color: var(--text); margin-bottom: 0.4rem; }
  .home-sub { color: var(--text2); font-size: 0.95rem; }

  /* FILTERS */
  .filters-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; position: sticky; top: 58px; z-index: 90; }
  .filters-inner { max-width: 1100px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .filter-input { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 7px 14px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 14px; width: 220px; outline: none; }
  .filter-input:focus { border-color: var(--accent); }
  .filter-input::placeholder { color: var(--text3); }
  .filter-select { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 7px 12px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; cursor: pointer; }
  .filter-select:focus { border-color: var(--accent); }
  .filter-select option { background: var(--surface2); }
  .fav-toggle { background: none; border: 1px solid var(--border2); color: var(--text2); padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; transition: all 0.15s; white-space: nowrap; }
  .fav-toggle.on { background: rgba(200,169,110,0.15); border-color: var(--accent); color: var(--accent); }
  .filter-clear { background: none; border: none; color: var(--text3); font-size: 12px; cursor: pointer; padding: 4px 8px; font-family: 'DM Sans', sans-serif; }
  .filter-clear:hover { color: var(--text2); }

  /* RECIPE GRID */
  .recipe-grid { max-width: 1100px; margin: 0 auto; padding: 2rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.25rem; }
  .recipe-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.4rem; cursor: pointer; transition: all 0.18s; position: relative; }
  .recipe-card:hover { border-color: var(--border2); background: var(--surface2); transform: translateY(-2px); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.7rem; }
  .card-title { font-family: 'Lora', serif; font-size: 1.05rem; color: var(--text); line-height: 1.35; flex: 1; margin-right: 10px; }
  .fav-star { background: none; border: none; font-size: 16px; cursor: pointer; color: var(--text3); line-height: 1; padding: 2px; flex-shrink: 0; transition: color 0.15s; }
  .fav-star.active { color: var(--accent); }
  .card-desc { font-size: 13px; color: var(--text2); margin-bottom: 1rem; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; letter-spacing: 0.02em; }
  .badge-time { background: rgba(74,140,92,0.18); color: #6dbf8a; border: 1px solid rgba(74,140,92,0.3); }
  .badge-diff { background: rgba(200,169,110,0.14); color: var(--accent); border: 1px solid rgba(200,169,110,0.25); }
  .badge-meal { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); }
  .badge-diff.hard { background: rgba(140,74,74,0.18); color: #d08080; border-color: rgba(140,74,74,0.3); }
  .no-results { max-width: 1100px; margin: 0 auto; padding: 4rem 2rem; text-align: center; color: var(--text3); }
  .no-results h3 { font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--text2); }

  /* RECIPE DETAIL */
  .detail-page { max-width: 780px; margin: 0 auto; padding: 2rem; }
  .back-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; padding: 0; margin-bottom: 2rem; display: flex; align-items: center; gap: 6px; transition: color 0.15s; }
  .back-btn:hover { color: var(--text2); }
  .detail-header { margin-bottom: 2rem; }
  .detail-title { font-size: 2rem; color: var(--text); margin-bottom: 0.8rem; }
  .detail-desc { color: var(--text2); font-size: 0.95rem; margin-bottom: 1.2rem; line-height: 1.6; }
  .detail-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
  .detail-fav { background: none; border: 1px solid var(--border2); color: var(--text2); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; transition: all 0.15s; }
  .detail-fav.active { border-color: var(--accent); color: var(--accent); background: rgba(200,169,110,0.1); }
  .detail-divider { border: none; border-top: 1px solid var(--border); margin: 1.8rem 0; }
  .detail-section-title { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 1rem; }
  .ingredients-list { list-style: none; display: grid; grid-template-columns: 1fr 1fr; gap: 4px 1.5rem; }
  .ingredients-list li { font-size: 14px; color: var(--text2); padding: 5px 0; border-bottom: 1px solid var(--border); line-height: 1.4; }
  .steps-list { list-style: none; counter-reset: steps; }
  .steps-list li { counter-increment: steps; display: flex; gap: 1rem; margin-bottom: 1.2rem; font-size: 14px; color: var(--text2); line-height: 1.6; }
  .steps-list li::before { content: counter(steps); background: var(--surface2); color: var(--accent); border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; margin-top: 1px; border: 1px solid var(--border2); }
  .tags-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 1.5rem; }
  .tag { background: var(--surface2); border: 1px solid var(--border); color: var(--text3); padding: 3px 10px; border-radius: 20px; font-size: 12px; }

  /* AI GENERATE PAGE */
  .ai-page { max-width: 780px; margin: 0 auto; padding: 2rem; }
  .ai-header { margin-bottom: 1.5rem; }
  .ai-title { font-size: 1.8rem; margin-bottom: 0.4rem; }
  .ai-sub { color: var(--text2); font-size: 0.9rem; }
  .api-key-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.2rem 1.5rem; margin-bottom: 1.5rem; }
  .api-key-label { font-size: 12px; color: var(--text3); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; font-weight: 500; }
  .api-key-row { display: flex; gap: 8px; }
  .api-key-input { flex: 1; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 8px 12px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; }
  .api-key-input:focus { border-color: var(--accent); }
  .api-key-input::placeholder { color: var(--text3); }
  .api-save-btn { background: var(--accent); color: #0f0f0f; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; white-space: nowrap; }
  .api-save-btn:hover { background: var(--accent2); color: #fff; }
  .api-status { font-size: 12px; margin-top: 6px; }
  .api-status.set { color: #6dbf8a; }
  .api-status.unset { color: var(--text3); }

  /* CHAT */
  .chat-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); display: flex; flex-direction: column; overflow: hidden; margin-bottom: 1.5rem; }
  .chat-messages { padding: 1.25rem; display: flex; flex-direction: column; gap: 14px; min-height: 200px; max-height: 480px; overflow-y: auto; }
  .chat-msg { max-width: 82%; line-height: 1.55; font-size: 14px; }
  .chat-msg.assistant { align-self: flex-start; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px 14px 14px 14px; padding: 10px 14px; color: var(--text); white-space: pre-wrap; }
  .chat-msg.user { align-self: flex-end; background: rgba(200,169,110,0.15); border: 1px solid rgba(200,169,110,0.25); border-radius: 14px 4px 14px 14px; padding: 10px 14px; color: var(--text); }
  .chat-msg.thinking { align-self: flex-start; color: var(--text3); font-style: italic; font-size: 13px; padding: 4px 0; }
  .chat-input-row { border-top: 1px solid var(--border); display: flex; gap: 0; }
  .chat-input { flex: 1; background: transparent; border: none; color: var(--text); padding: 12px 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; resize: none; min-height: 48px; max-height: 120px; line-height: 1.5; }
  .chat-input::placeholder { color: var(--text3); }
  .chat-send-btn { background: var(--accent); color: #0f0f0f; border: none; padding: 0 18px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; transition: background 0.15s; flex-shrink: 0; }
  .chat-send-btn:hover:not(:disabled) { background: var(--accent2); color: #fff; }
  .chat-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .chat-controls { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: space-between; align-items: center; }
  .gen-recipe-btn { background: var(--green); color: #fff; border: none; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; transition: opacity 0.15s; }
  .gen-recipe-btn:hover:not(:disabled) { opacity: 0.85; }
  .gen-recipe-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .new-chat-btn { background: none; border: 1px solid var(--border2); color: var(--text3); padding: 7px 14px; border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; transition: all 0.15s; }
  .new-chat-btn:hover { border-color: var(--border2); color: var(--text2); }
  .chat-hint { font-size: 12px; color: var(--text3); }

  .draft-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; }
  .draft-title { font-size: 1.1rem; margin-bottom: 1.2rem; color: var(--text2); font-family: 'DM Sans', sans-serif; font-weight: 400; }
  .draft-title span { color: var(--accent); }
  .draft-field { margin-bottom: 1rem; }
  .draft-field-label { font-size: 11px; color: var(--text3); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 5px; font-weight: 500; }
  .draft-input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 8px 12px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; }
  .draft-input:focus { border-color: var(--accent); }
  .draft-textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 8px 12px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; resize: vertical; min-height: 80px; line-height: 1.5; }
  .draft-textarea:focus { border-color: var(--accent); }
  .draft-row { display: flex; gap: 10px; }
  .draft-row .draft-field { flex: 1; }
  .draft-actions { display: flex; gap: 10px; margin-top: 1.5rem; padding-top: 1.2rem; border-top: 1px solid var(--border); }
  .publish-btn { background: var(--green); color: #fff; border: none; padding: 10px 22px; border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; transition: opacity 0.15s; }
  .publish-btn:hover { opacity: 0.85; }
  .discard-btn { background: none; border: 1px solid var(--border2); color: var(--text3); padding: 10px 18px; border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; transition: all 0.15s; }
  .discard-btn:hover { border-color: var(--red); color: #d08080; }

  .spinner { width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: rgba(140,74,74,0.15); border: 1px solid rgba(140,74,74,0.35); border-radius: var(--radius); padding: 1rem 1.2rem; color: #d08080; font-size: 13px; margin-bottom: 1rem; }

  /* TOAST */
  .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 12px 18px; border-radius: var(--radius); font-size: 13px; z-index: 999; animation: slideup 0.2s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  @keyframes slideup { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    nav { padding: 0 1rem; }
    .home-header, .container { padding-left: 1rem; padding-right: 1rem; }
    .recipe-grid { padding: 1rem; grid-template-columns: 1fr; }
    .ingredients-list { grid-template-columns: 1fr; }
    .detail-page, .ai-page { padding: 1rem; }
    .filters-bar { padding: 0.75rem 1rem; }
    .home-title { font-size: 1.7rem; }
    .draft-row { flex-direction: column; }
  }
  /* AUTH */
  .auth-btn { background: var(--surface2); border: 1px solid var(--border2); color: var(--text2); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; display: flex; align-items: center; gap: 7px; transition: all 0.15s; }
  .auth-btn:hover { border-color: var(--accent); color: var(--accent); }
  .auth-btn img { width: 16px; height: 16px; border-radius: 50%; }
  .auth-avatar { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border2); cursor: pointer; }
  .auth-dropdown { position: relative; }
  .auth-menu { position: absolute; right: 0; top: calc(100% + 8px); background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); min-width: 180px; z-index: 200; overflow: hidden; }
  .auth-menu-item { padding: 10px 14px; font-size: 13px; color: var(--text2); cursor: pointer; display: block; width: 100%; text-align: left; background: none; border: none; font-family: 'DM Sans', sans-serif; transition: background 0.1s; }
  .auth-menu-item:hover { background: var(--surface); color: var(--text); }
  .auth-menu-name { padding: 10px 14px; font-size: 12px; color: var(--text3); border-bottom: 1px solid var(--border); }
  .admin-badge { background: rgba(200,169,110,0.15); color: var(--accent); border: 1px solid rgba(200,169,110,0.3); padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

<nav>
  <div class="nav-brand" onclick="showPage('home')">Jacob's Cookbook</div>
  <div class="nav-links">
    <button class="nav-btn active" id="nav-home" onclick="showPage('home')">Recipes</button>
    <button class="nav-btn" id="nav-ai" onclick="showPage('ai')" style="display:none">AI Generate</button>
    <div class="auth-dropdown" id="auth-area">
      <button class="auth-btn" id="auth-btn" onclick="signIn()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.2"/><path d="M2.5 13.5c0-3.038 2.462-5.5 5.5-5.5s5.5 2.462 5.5 5.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        Sign in
      </button>
    </div>
  </div>
</nav>

<!-- HOME PAGE -->
<div class="page active" id="page-home">
  <div class="home-header">
    <h1 class="home-title">All Recipes</h1>
    <p class="home-sub" id="recipe-count">16 recipes</p>
  </div>
  <div class="filters-bar">
    <div class="filters-inner">
      <input class="filter-input" type="text" id="search" placeholder="Search recipes..." oninput="applyFilters()">
      <select class="filter-select" id="f-meal" onchange="applyFilters()">
        <option value="">All meal types</option>
        <option value="breakfast">Breakfast</option>
        <option value="lunch">Lunch</option>
        <option value="dinner">Dinner</option>
        <option value="snack">Snack</option>
        <option value="dessert">Dessert</option>
        <option value="other">Other</option>
      </select>
      <select class="filter-select" id="f-diff" onchange="applyFilters()">
        <option value="">Any difficulty</option>
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
      </select>
      <select class="filter-select" id="f-time" onchange="applyFilters()">
        <option value="">Any time</option>
        <option value="20">≤ 20 min</option>
        <option value="30">≤ 30 min</option>
        <option value="45">≤ 45 min</option>
        <option value="60">≤ 60 min</option>
      </select>
      <select class="filter-select" id="f-sort" onchange="applyFilters()">
        <option value="newest">Newest first</option>
        <option value="fastest">Fastest first</option>
        <option value="alpha">A → Z</option>
        <option value="diff">By difficulty</option>
      </select>
      <button class="fav-toggle" id="fav-toggle" onclick="toggleFavFilter()">★ Favorites</button>
      <button class="filter-clear" onclick="clearFilters()">Clear filters</button>
    </div>
  </div>
  <div class="recipe-grid" id="recipe-grid"></div>
</div>

<!-- DETAIL PAGE -->
<div class="page" id="page-detail">
  <div class="detail-page" id="detail-content"></div>
</div>

<!-- AI PAGE -->
<div class="page" id="page-ai">
  <div class="ai-page">
    <div class="ai-header">
      <h1 class="ai-title">AI Recipe Generator</h1>
      <p class="ai-sub">Chat with Claude to build a recipe around your preferences, then publish it to your cookbook.</p>
    </div>

    <div class="api-key-section">
      <div class="api-key-label">Anthropic API Key</div>
      <div class="api-key-row">
        <input class="api-key-input" type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off">
        <button class="api-save-btn" onclick="saveApiKey()">Save Key</button>
      </div>
      <div class="api-status" id="api-status"></div>
    </div>

    <div class="chat-wrap">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-row">
        <textarea class="chat-input" id="chat-input" placeholder="Tell Claude what you want to make..." rows="1" onkeydown="chatKeydown(event)"></textarea>
        <button class="chat-send-btn" id="chat-send" onclick="sendChat()">Send</button>
      </div>
      <div class="chat-controls">
        <div class="chat-hint" id="chat-hint">Start by describing what you want to make.</div>
        <div style="display:flex;gap:8px;">
          <button class="new-chat-btn" onclick="resetChat()">New chat</button>
          <button class="gen-recipe-btn" id="gen-recipe-btn" onclick="finalizeRecipe()" disabled>Generate Recipe</button>
        </div>
      </div>
    </div>

    <div id="gen-error"></div>
    <div id="gen-draft"></div>
  </div>
</div>

<script>
// ── FIREBASE INIT ──────────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey: "AIzaSyDilCyclXc-7WFrodgSQTXxj-nFQ46sWv8",
  authDomain: "jacobs-cookbook.firebaseapp.com",
  projectId: "jacobs-cookbook",
  storageBucket: "jacobs-cookbook.firebasestorage.app",
  messagingSenderId: "189328116988",
  appId: "1:189328116988:web:7c9658ad88d1f324f85b79"
});
const auth = firebase.auth();
const db = firebase.firestore();
const googleProvider = new firebase.auth.GoogleAuthProvider();

// ── ADMIN CONFIG ────────────────────────────────────────────────────────────
// To find your UID: sign in, open browser console, type: firebase.auth().currentUser.uid
// Then replace the string below with your UID

// ── DATA (FIRESTORE) ────────────────────────────────────────────────────────
async function initData() {
  // Show loading state
  document.getElementById('recipe-grid').innerHTML = '<div class="no-results" style="grid-column:1/-1"><p style="color:var(--text3);">Loading recipes...</p></div>';

  try {
    // Check if Firestore has recipes, if not seed it
    const snapshot = await db.collection('recipes').limit(1).get();
    if (snapshot.empty) {
      const batch = db.batch();
      SEED.forEach(r => { batch.set(db.collection('recipes').doc(r.id), r); });
      await batch.commit();
    }

    // Set up real-time listener
    db.collection('recipes').where('status', '==', 'published')
      .onSnapshot(snap => {
        recipes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        applyFilters();
      }, err => {
        console.error('Firestore listener error:', err);
        // Fall back to seed data so the page still works
        recipes = [...SEED];
        applyFilters();
      });
  } catch(e) {
    console.error('Firestore init error:', e);
    recipes = [...SEED];
    applyFilters();
  }
}

async function saveRecipeToFirestore(r) {
  await db.collection('recipes').doc(r.id).set(r);
}

async function updateRecipeInFirestore(id, data) {
  await db.collection('recipes').doc(id).update(data);
}

async function deleteRecipeFromFirestore(id) {
  await db.collection('recipes').doc(id).delete();
}

// ── AUTH ────────────────────────────────────────────────────────────────────
auth.onAuthStateChanged(async user => {
  currentUser = user;
  isAdmin = user && user.uid === ADMIN_UID;
  updateAuthUI();
  if (user) {
    isAllowedEditor = isAdmin || await checkAllowedEditor(user.uid);
    await loadFavsFromFirestore();
  } else {
    isAllowedEditor = false;
    favs = new Set();
  }
  applyFilters();
  if (currentDetail) renderDetail(currentDetail);
});

function signIn() {
  auth.signInWithPopup(googleProvider).catch(e => showToast('Sign-in failed: ' + e.message));
}

function signOut() {
  auth.signOut();
  favs = new Set();
  closeAuthMenu();
  showToast('Signed out');
}

function updateAuthUI() {
  const area = document.getElementById('auth-area');
  const aiBtn = document.getElementById('nav-ai');

  // Show AI Generate tab for any signed-in user
  aiBtn.style.display = currentUser ? 'inline-block' : 'none';

  if (!currentUser) {
    area.innerHTML = `<button class="auth-btn" onclick="signIn()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.2"/><path d="M2.5 13.5c0-3.038 2.462-5.5 5.5-5.5s5.5 2.462 5.5 5.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      Sign in
    </button>`;
    return;
  }

  const photo = currentUser.photoURL ? `<img src="${currentUser.photoURL}" class="auth-avatar">` : `<div class="auth-avatar" style="background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text2);">${(currentUser.displayName||'U')[0]}</div>`;

  area.innerHTML = `<div style="position:relative;">
    <button class="auth-btn" onclick="toggleAuthMenu()" id="auth-avatar-btn">
      ${photo}
      ${currentUser.displayName ? currentUser.displayName.split(' ')[0] : 'Account'}
      ${isAdmin ? '<span class="admin-badge">Admin</span>' : ''}
    </button>
    <div class="auth-menu" id="auth-menu" style="display:none;">
      <div class="auth-menu-name">${currentUser.email}</div>
      ${isAdmin ? '<div class="auth-menu-name" style="color:var(--accent);border-bottom:none;padding-top:4px;">Administrator</div>' : ''}
      <button class="auth-menu-item" onclick="signOut()">Sign out</button>
    </div>
  </div>`;
}

function toggleAuthMenu() {
  const menu = document.getElementById('auth-menu');
  if (!menu) return;
  authMenuOpen = !authMenuOpen;
  menu.style.display = authMenuOpen ? 'block' : 'none';
}

function closeAuthMenu() {
  authMenuOpen = false;
  const menu = document.getElementById('auth-menu');
  if (menu) menu.style.display = 'none';
}

document.addEventListener('click', e => {
  if (!e.target.closest('#auth-area')) closeAuthMenu();
});

// ── FIRESTORE FAVORITES ─────────────────────────────────────────────────────
async function checkAllowedEditor(uid) {
  try {
    const doc = await db.collection('allowedEditors').doc(uid).get();
    return doc.exists;
  } catch(e) { return false; }
}

async function loadFavsFromFirestore() {
  if (!currentUser) return;
  try {
    const doc = await db.collection('favorites').doc(currentUser.uid).get();
    if (doc.exists) favs = new Set(doc.data().ids || []);
    else favs = new Set();
  } catch(e) { favs = new Set(); }
}

async function saveFavsToFirestore() {
  if (!currentUser) return;
  try {
    await db.collection('favorites').doc(currentUser.uid).set({ ids: [...favs] });
  } catch(e) { console.error('Failed to save favs', e); }
}

// ── NAVIGATION ─────────────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const navTarget = name === 'detail' ? 'home' : name;
  const navEl = document.getElementById('nav-' + navTarget);
  if (navEl) navEl.classList.add('active');
  window.scrollTo(0, 0);
}

// ── GRID ───────────────────────────────────────────────────────────────────
function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const meal = document.getElementById('f-meal').value;
  const diff = document.getElementById('f-diff').value;
  const timeMax = document.getElementById('f-time').value;
  const sort = document.getElementById('f-sort').value;

  let filtered = recipes.filter(r => r.status === 'published');
  if (q) filtered = filtered.filter(r =>
    r.title.toLowerCase().includes(q) ||
    (r.description||'').toLowerCase().includes(q) ||
    (r.tags||[]).some(t => t.toLowerCase().includes(q)) ||
    (r.ingredients||[]).some(i => i.toLowerCase().includes(q))
  );
  if (meal) filtered = filtered.filter(r => r.meal_type === meal);
  if (diff) filtered = filtered.filter(r => r.difficulty === diff);
  if (timeMax) filtered = filtered.filter(r => r.total_time_minutes && r.total_time_minutes <= parseInt(timeMax));
  if (showFavsOnly) filtered = filtered.filter(r => favs.has(r.id));

  const diffOrder = { easy:0, medium:1, hard:2 };
  if (sort === 'newest') filtered.sort((a,b) => new Date(b.created_date) - new Date(a.created_date));
  else if (sort === 'fastest') filtered.sort((a,b) => (a.total_time_minutes||999) - (b.total_time_minutes||999));
  else if (sort === 'alpha') filtered.sort((a,b) => a.title.localeCompare(b.title));
  else if (sort === 'diff') filtered.sort((a,b) => (diffOrder[a.difficulty]||0) - (diffOrder[b.difficulty]||0));

  renderGrid(filtered);
  document.getElementById('recipe-count').textContent = `${filtered.length} recipe${filtered.length!==1?'s':''}`;
}

function renderGrid(list) {
  const grid = document.getElementById('recipe-grid');
  if (!list.length) {
    grid.innerHTML = '<div class="no-results" style="grid-column:1/-1"><h3>No recipes found</h3><p style="color:var(--text3);font-size:13px;margin-top:4px;">Try adjusting your filters.</p></div>';
    return;
  }
  grid.innerHTML = list.map(r => {
    const isFav = favs.has(r.id);
    const time = r.total_time_minutes ? `${r.total_time_minutes} min` : '';
    const diffClass = r.difficulty === 'hard' ? 'badge-diff hard' : 'badge-diff';
    const favStar = currentUser ? `<button class="fav-star ${isFav?'active':''}" onclick="event.stopPropagation();toggleFav('${r.id}')" title="Favorite">★</button>` : '';
    return `<div class="recipe-card" onclick="openDetail('${r.id}')">
      <div class="card-top">
        <div class="card-title">${r.title}</div>
        ${favStar}
      </div>
      ${r.description ? `<div class="card-desc">${r.description}</div>` : ''}
      <div class="card-meta">
        ${time ? `<span class="badge badge-time">${time}</span>` : ''}
        ${r.difficulty ? `<span class="badge ${diffClass}">${r.difficulty}</span>` : ''}
        ${r.meal_type ? `<span class="badge badge-meal">${r.meal_type}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function toggleFav(id) {
  if (!currentUser) { showToast('Sign in to save favorites'); return; }
  if (favs.has(id)) favs.delete(id);
  else favs.add(id);
  await saveFavsToFirestore();
  applyFilters();
  if (currentDetail === id) renderDetail(id);
}

function toggleFavFilter() {
  showFavsOnly = !showFavsOnly;
  document.getElementById('fav-toggle').classList.toggle('on', showFavsOnly);
  applyFilters();
}

function clearFilters() {
  document.getElementById('search').value = '';
  document.getElementById('f-meal').value = '';
  document.getElementById('f-diff').value = '';
  document.getElementById('f-time').value = '';
  document.getElementById('f-sort').value = 'newest';
  showFavsOnly = false;
  document.getElementById('fav-toggle').classList.remove('on');
  applyFilters();
}

// ── DETAIL ─────────────────────────────────────────────────────────────────
function openDetail(id) {
  currentDetail = id;
  renderDetail(id);
  showPage('detail');
}

function renderDetail(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  const isFav = favs.has(r.id);
  const metas = [];
  if (r.total_time_minutes) metas.push(`<span class="badge badge-time">${r.total_time_minutes} min total</span>`);
  if (r.prep_time_minutes) metas.push(`<span class="badge badge-meal">Prep: ${r.prep_time_minutes} min</span>`);
  if (r.servings) metas.push(`<span class="badge badge-meal">${r.servings}</span>`);
  if (r.difficulty) metas.push(`<span class="badge ${r.difficulty==='hard'?'badge-diff hard':'badge-diff'}">${r.difficulty}</span>`);
  if (r.meal_type) metas.push(`<span class="badge badge-meal">${r.meal_type}</span>`);

  const favBtn = currentUser
    ? `<button class="detail-fav ${isFav?'active':''}" onclick="toggleFav('${r.id}')">${isFav?'★ Favorited':'☆ Favorite'}</button>`
    : `<button class="detail-fav" onclick="showToast('Sign in to save favorites')" style="opacity:0.5">☆ Favorite</button>`;

  const editBtn = isAllowedEditor ? `<button class="nav-btn" onclick="renderEditDetail('${r.id}')">Edit</button>` : '';

  document.getElementById('detail-content').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;">
      <button class="back-btn" style="margin:0" onclick="showPage('home')">← Back to recipes</button>
      <div style="display:flex;gap:8px;">${favBtn}${editBtn}</div>
    </div>
    <div class="detail-header">
      <h1 class="detail-title">${r.title}</h1>
      ${r.description ? `<p class="detail-desc">${r.description}</p>` : ''}
      <div class="detail-meta">${metas.join('')}</div>
    </div>
    <hr class="detail-divider">
    ${r.ingredients&&r.ingredients.length ? `
      <div class="detail-section-title">Ingredients</div>
      <ul class="ingredients-list">${r.ingredients.map(i=>`<li>${esc(i)}</li>`).join('')}</ul>
      <hr class="detail-divider">` : ''}
    ${r.steps&&r.steps.length ? `
      <div class="detail-section-title">Instructions</div>
      <ol class="steps-list">${r.steps.map(s=>`<li><span>${esc(s)}</span></li>`).join('')}</ol>` : ''}
    ${r.tags&&r.tags.length ? `
      <hr class="detail-divider">
      <div class="tags-row">${r.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
  `;
}

function renderEditDetail(id) {
  if (!isAllowedEditor) return;
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  document.getElementById('detail-content').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;">
      <button class="back-btn" style="margin:0" onclick="renderDetail('${r.id}')">← Cancel</button>
      <span style="font-size:13px;color:var(--text3);">Editing recipe</span>
    </div>
    <div class="draft-section">
      <div class="draft-field"><div class="draft-field-label">Title</div><input class="draft-input" id="e-title" value="${esc(r.title)}"></div>
      <div class="draft-field"><div class="draft-field-label">Description</div><input class="draft-input" id="e-desc" value="${esc(r.description||'')}"></div>
      <div class="draft-row">
        <div class="draft-field"><div class="draft-field-label">Meal type</div><select class="draft-input" id="e-meal">${['breakfast','lunch','dinner','snack','dessert','other'].map(m=>`<option value="${m}" ${r.meal_type===m?'selected':''}>${m}</option>`).join('')}</select></div>
        <div class="draft-field"><div class="draft-field-label">Difficulty</div><select class="draft-input" id="e-diff">${['easy','medium','hard'].map(d=>`<option value="${d}" ${r.difficulty===d?'selected':''}>${d}</option>`).join('')}</select></div>
        <div class="draft-field"><div class="draft-field-label">Total time (min)</div><input class="draft-input" id="e-time" type="number" value="${r.total_time_minutes||''}"></div>
        <div class="draft-field"><div class="draft-field-label">Servings</div><input class="draft-input" id="e-servings" value="${esc(r.servings||'')}"></div>
      </div>
      <div class="draft-field"><div class="draft-field-label">Ingredients (one per line)</div><textarea class="draft-textarea" id="e-ingredients" rows="10">${(r.ingredients||[]).map(i=>esc(i)).join('\n')}</textarea></div>
      <div class="draft-field"><div class="draft-field-label">Steps (one per line)</div><textarea class="draft-textarea" id="e-steps" rows="12">${(r.steps||[]).map(s=>esc(s)).join('\n')}</textarea></div>
      <div class="draft-field"><div class="draft-field-label">Tags (comma separated)</div><input class="draft-input" id="e-tags" value="${(r.tags||[]).join(', ')}"></div>
      <div class="draft-actions">
        <button class="publish-btn" onclick="saveEdit('${r.id}')">Save Changes</button>
        ${isAdmin ? `<button class="discard-btn" onclick="deleteRecipe('${r.id}')">Delete Recipe</button>` : ''}
      </div>
    </div>`;
  window.scrollTo(0,0);
}

async function saveEdit(id) {
  if (!isAllowedEditor) return;
  const idx = recipes.findIndex(x => x.id === id);
  if (idx === -1) return;
  const updated = { ...recipes[idx],
    title: document.getElementById('e-title').value.trim(),
    description: document.getElementById('e-desc').value.trim(),
    meal_type: document.getElementById('e-meal').value,
    difficulty: document.getElementById('e-diff').value,
    total_time_minutes: parseInt(document.getElementById('e-time').value)||null,
    servings: document.getElementById('e-servings').value.trim(),
    ingredients: document.getElementById('e-ingredients').value.split('\n').map(s=>s.trim()).filter(Boolean),
    steps: document.getElementById('e-steps').value.split('\n').map(s=>s.trim()).filter(Boolean),
    tags: document.getElementById('e-tags').value.split(',').map(s=>s.trim()).filter(Boolean),
    updated_date: new Date().toISOString(),
  };
  await updateRecipeInFirestore(id, updated);
  renderDetail(id); showToast('Recipe saved'); window.scrollTo(0,0);
}

async function deleteRecipe(id) {
  if (!isAdmin) { showToast('Only the admin can delete recipes'); return; }
  if (!confirm('Delete this recipe? This cannot be undone.')) return;
  await deleteRecipeFromFirestore(id);
  showPage('home'); showToast('Recipe deleted');
}

// ── API KEY ─────────────────────────────────────────────────────────────────
function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) { updateApiStatus(false); return; }
  localStorage.setItem(API_KEY_STORE, key);
  updateApiStatus(true);
  showToast('API key saved');
}
function updateApiStatus(isSet) {
  const el = document.getElementById('api-status');
  el.className = 'api-status ' + (isSet ? 'set' : 'unset');
  el.textContent = isSet ? '✓ API key saved — ready to generate' : 'No key saved yet';
}
function getApiKey() { return localStorage.getItem(API_KEY_STORE) || ''; }

// ── CHAT ────────────────────────────────────────────────────────────────────
let chatHistory = [];
let chatBusy = false;

const CHAT_SYSTEM = `You are a friendly recipe development assistant helping someone build recipes for their personal cookbook.

Your job is to have a short, focused conversation to understand their preferences, then generate the recipe when they're ready.

Rules:
- Start by asking what they want to make, then ask 2-4 focused clarifying questions about preferences (protein, flavors, time, dietary needs, equipment, serving size, etc). Ask them naturally, not as a numbered list every time.
- Keep responses concise and conversational. No long essays.
- When you have enough info (usually after 2-4 exchanges), offer to generate the recipe by saying something like "I have everything I need — ready to build the recipe?" or similar. The user can also ask you to generate at any time.
- When the user confirms they want the recipe generated, output ONLY a JSON object (no other text, no markdown fences) with exactly these fields:
{
  "title": "string",
  "description": "one sentence",
  "meal_type": "breakfast|lunch|dinner|snack|dessert|other",
  "difficulty": "easy|medium|hard",
  "servings": "string",
  "total_time_minutes": number,
  "prep_time_minutes": number,
  "cook_time_minutes": number,
  "tags": ["array"],
  "ingredients": ["with amounts"],
  "steps": ["clear actionable steps"]
}
- Never output JSON until the user has confirmed they want the recipe. Always converse first.`;

function resetChat() {
  chatHistory = [];
  document.getElementById('chat-messages').innerHTML = '';
  document.getElementById('gen-draft').innerHTML = '';
  document.getElementById('gen-error').innerHTML = '';
  document.getElementById('gen-recipe-btn').disabled = true;
  document.getElementById('chat-hint').textContent = 'Start by describing what you want to make.';
  draftRecipe = null;
  addChatMsg('assistant', "What would you like to make? Tell me anything — an ingredient you have, a craving, a cuisine, or a meal type.");
}

function addChatMsg(role, text) {
  const el = document.createElement('div');
  el.className = 'chat-msg ' + role;
  el.textContent = text;
  const container = document.getElementById('chat-messages');
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
  return el;
}

function chatKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}

async function sendChat() {
  if (chatBusy) return;
  const key = getApiKey();
  if (!key) { showError('Please save your Anthropic API key first.'); return; }
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addChatMsg('user', text);
  chatHistory.push({ role: 'user', content: text });
  const thinking = addChatMsg('thinking', 'Claude is thinking…');
  chatBusy = true;
  document.getElementById('chat-send').disabled = true;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: CHAT_SYSTEM, messages: chatHistory })
    });
    if (!res.ok) { const err = await res.json().catch(()=>({})); throw new Error(err.error?.message||`API error ${res.status}`); }
    const data = await res.json();
    const reply = data.content[0]?.text || '';
    thinking.remove();
    if (reply.trim().startsWith('{')) {
      try {
        const recipe = JSON.parse(reply.trim());
        recipe.id = 'gen_' + Date.now();
        recipe.status = 'draft';
        recipe.created_date = new Date().toISOString();
        recipe.slug = recipe.title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
        draftRecipe = recipe;
        chatHistory.push({ role: 'assistant', content: reply });
        addChatMsg('assistant', `Here's your recipe for "${recipe.title}" — review and edit it below before publishing.`);
        renderDraft(recipe);
        document.getElementById('gen-recipe-btn').disabled = true;
        document.getElementById('chat-hint').textContent = 'Recipe generated. Review the draft below.';
        return;
      } catch(e) {}
    }
    chatHistory.push({ role: 'assistant', content: reply });
    addChatMsg('assistant', reply);
    if (chatHistory.length >= 2) {
      document.getElementById('gen-recipe-btn').disabled = false;
      document.getElementById('chat-hint').textContent = 'Ready? Click "Generate Recipe" or keep chatting.';
    }
  } catch(e) {
    thinking.remove();
    showError('Error: ' + e.message);
  } finally {
    chatBusy = false;
    document.getElementById('chat-send').disabled = false;
    document.getElementById('chat-input').focus();
  }
}

async function finalizeRecipe() {
  if (chatBusy) return;
  document.getElementById('chat-input').value = "Go ahead and generate the recipe now.";
  await sendChat();
}

// ── DRAFT ───────────────────────────────────────────────────────────────────
function renderDraft(r) {
  document.getElementById('gen-draft').innerHTML = `
    <div class="draft-section">
      <div class="draft-title">Review & edit before saving — <span>Draft</span></div>
      <div class="draft-field"><div class="draft-field-label">Title</div><input class="draft-input" id="d-title" value="${esc(r.title)}"></div>
      <div class="draft-field"><div class="draft-field-label">Description</div><input class="draft-input" id="d-desc" value="${esc(r.description||'')}"></div>
      <div class="draft-row">
        <div class="draft-field"><div class="draft-field-label">Meal type</div><select class="draft-input" id="d-meal">${['breakfast','lunch','dinner','snack','dessert','other'].map(m=>`<option value="${m}" ${r.meal_type===m?'selected':''}>${m}</option>`).join('')}</select></div>
        <div class="draft-field"><div class="draft-field-label">Difficulty</div><select class="draft-input" id="d-diff">${['easy','medium','hard'].map(d=>`<option value="${d}" ${r.difficulty===d?'selected':''}>${d}</option>`).join('')}</select></div>
        <div class="draft-field"><div class="draft-field-label">Total time (min)</div><input class="draft-input" id="d-time" type="number" value="${r.total_time_minutes||''}"></div>
        <div class="draft-field"><div class="draft-field-label">Servings</div><input class="draft-input" id="d-servings" value="${esc(r.servings||'')}"></div>
      </div>
      <div class="draft-field"><div class="draft-field-label">Ingredients (one per line)</div><textarea class="draft-textarea" id="d-ingredients" rows="8">${(r.ingredients||[]).join('\n')}</textarea></div>
      <div class="draft-field"><div class="draft-field-label">Steps (one per line)</div><textarea class="draft-textarea" id="d-steps" rows="10">${(r.steps||[]).join('\n')}</textarea></div>
      <div class="draft-field"><div class="draft-field-label">Tags (comma separated)</div><input class="draft-input" id="d-tags" value="${(r.tags||[]).join(', ')}"></div>
      <div class="draft-actions">
        <button class="publish-btn" onclick="publishDraft()">Publish Recipe</button>
        <button class="discard-btn" onclick="discardDraft()">Discard</button>
      </div>
    </div>`;
}

async function publishDraft() {
  if (!draftRecipe) return;
  const r = { ...draftRecipe,
    title: document.getElementById('d-title').value.trim(),
    description: document.getElementById('d-desc').value.trim(),
    meal_type: document.getElementById('d-meal').value,
    difficulty: document.getElementById('d-diff').value,
    total_time_minutes: parseInt(document.getElementById('d-time').value)||null,
    servings: document.getElementById('d-servings').value.trim(),
    ingredients: document.getElementById('d-ingredients').value.split('\n').map(s=>s.trim()).filter(Boolean),
    steps: document.getElementById('d-steps').value.split('\n').map(s=>s.trim()).filter(Boolean),
    tags: document.getElementById('d-tags').value.split(',').map(s=>s.trim()).filter(Boolean),
    status: 'published',
    published_at: new Date().toISOString(),
    slug: document.getElementById('d-title').value.trim().toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''),
  };
  await saveRecipeToFirestore(r);
  draftRecipe = null;
  document.getElementById('gen-draft').innerHTML = '';
  showToast('Recipe published!');
  showPage('home');
}

function discardDraft() {
  draftRecipe = null;
  document.getElementById('gen-draft').innerHTML = '';
  showToast('Draft discarded');
}

// ── HELPERS ─────────────────────────────────────────────────────────────────
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function showError(msg) { document.getElementById('gen-error').innerHTML = `<div class="error-box">${msg}</div>`; }

let toastTimer;
function showToast(msg) {
  clearTimeout(toastTimer);
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id='toast'; t.className='toast'; document.body.appendChild(t); }
  t.textContent = msg; t.style.display = 'block';
  toastTimer = setTimeout(()=>{ t.style.display='none'; }, 2500);
}

// ── INIT ───────────────────────────────────────────────────────────────────
const _apiKey = localStorage.getItem(API_KEY_STORE);
if (_apiKey) { document.getElementById('api-key-input').value = _apiKey; updateApiStatus(true); }
initData();
resetChat();
</script>
